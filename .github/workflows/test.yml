name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run R&D benchmark gate
        run: python -m finagentbench gate fixtures/pass_finrun.json --case fixtures/case_compare_rd.json --profile ci --out outputs/ci-rd-gate

      - name: Run big tech FCF benchmark gate
        run: python -m finagentbench gate fixtures/pass_bigtech_finrun.json --case fixtures/case_bigtech_fcf.json --profile ci --out outputs/ci-bigtech-gate

      - name: Run due diligence benchmark gate
        run: python -m finagentbench gate fixtures/pass_due_diligence_finrun.json --case fixtures/case_due_diligence.json --profile ci --out outputs/ci-dd-gate

      - name: Run curated due diligence benchmark suite
        run: python -m finagentbench benchmark benchmarks/due_diligence/suite.json --out outputs/dd-suite-report.json

      - name: Run LumenFin regression suite
        run: python -m finagentbench benchmark benchmarks/lumenfin_regression/suite.json --out outputs/lumenfin-regression-report.json

      - name: Run LumenFin real-trace gate
        run: python -m finagentbench gate fixtures/lumenfin_state_sample.json --adapter lumenfin --case fixtures/case_lumenfin_diligence.json --profile ci --out outputs/ci-lumenfin-gate

      - name: Run semantic static replay suite
        run: python -m finagentbench semantic-benchmark benchmarks/semantic_audit/evidence_support_golden.json --out outputs/evidence-support-golden.json

      - name: Run risk quality semantic replay suite
        run: python -m finagentbench semantic-benchmark benchmarks/semantic_audit/risk_quality_golden.json --out outputs/risk-quality-golden.json

      - name: Run compliance semantic replay suite
        run: python -m finagentbench semantic-benchmark benchmarks/semantic_audit/compliance_semantic_golden.json --out outputs/compliance-semantic-golden.json

      - name: Assert failing due diligence run is blocked
        run: |
          set +e
          python -m finagentbench evaluate fixtures/fail_due_diligence_finrun.json --case fixtures/case_due_diligence.json --profile ci --out outputs/ci-dd-fail
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected fail_due_diligence_finrun.json to fail, but it passed."
            exit 1
          fi

      - name: Run reference runtime and evaluate exported trace
        run: |
          python -m finagentbench run-reference --out outputs/reference-agent-run.json
          python -m finagentbench evaluate outputs/reference-agent-run.json --case fixtures/case_bigtech_fcf.json --out outputs/reference-agent-eval
