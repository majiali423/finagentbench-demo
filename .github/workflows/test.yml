name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run R&D benchmark gate
        run: python -m finagentbench gate fixtures/pass_finrun.json --case fixtures/case_compare_rd.json --out outputs/ci-rd-gate

      - name: Run big tech FCF benchmark gate
        run: python -m finagentbench gate fixtures/pass_bigtech_finrun.json --case fixtures/case_bigtech_fcf.json --out outputs/ci-bigtech-gate

      - name: Run reference runtime and evaluate exported trace
        run: |
          python -m finagentbench run-reference --out outputs/reference-agent-run.json
          python -m finagentbench evaluate outputs/reference-agent-run.json --case fixtures/case_bigtech_fcf.json --out outputs/reference-agent-eval
