name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run R&D benchmark gate
        run: python -m finagentbench gate fixtures/pass_finrun.json --case fixtures/case_compare_rd.json --out outputs/ci-rd-gate

      - name: Run big tech FCF benchmark gate
        run: python -m finagentbench gate fixtures/pass_bigtech_finrun.json --case fixtures/case_bigtech_fcf.json --out outputs/ci-bigtech-gate

      - name: Run due diligence benchmark gate
        run: python -m finagentbench gate fixtures/pass_due_diligence_finrun.json --case fixtures/case_due_diligence.json --out outputs/ci-dd-gate

      - name: Run curated due diligence benchmark suite
        run: python -m finagentbench benchmark benchmarks/due_diligence/suite.json --out outputs/dd-suite-report.json

      - name: Assert failing due diligence run is blocked
        run: |
          set +e
          python -m finagentbench evaluate fixtures/fail_due_diligence_finrun.json --case fixtures/case_due_diligence.json --out outputs/ci-dd-fail
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Expected fail_due_diligence_finrun.json to fail, but it passed."
            exit 1
          fi

      - name: Run reference runtime and evaluate exported trace
        run: |
          python -m finagentbench run-reference --out outputs/reference-agent-run.json
          python -m finagentbench evaluate outputs/reference-agent-run.json --case fixtures/case_bigtech_fcf.json --out outputs/reference-agent-eval
